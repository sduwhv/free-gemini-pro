<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/img/logo.png" />

    <!-- Mobile viewport — no scaling issues -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO -->
    <title>Gemini Pro Gratis 1 Tahun — Google One Premium via Invite Family</title>
    <meta name="description" content="Dapatkan akses Gemini Advanced, Google One 2TB, Gemini di Gmail & Docs gratis selama 1 tahun via program Invite Family Google. Resmi, aman, terpercaya." />

    <!-- Open Graph -->
    <meta property="og:title" content="Gemini Pro Gratis 1 Tahun" />

    <style>

      html, body { background-color: #080808; color: #fff; }
    </style>
  </head>
